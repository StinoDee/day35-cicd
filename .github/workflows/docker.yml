name: Docker CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3.- Name: Set up Docker image tag
  id: vars
  run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    # 4. Name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/day35-cicd:latest \
                 -t ${{ secrets.DOCKER_USERNAME }}/day35-cicd:$TAG .

    # 5. Name: Push Docker image
         run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/day35-cicd:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/day35-cicd:$TAG
