- name: Deploy via SSH
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: ${{ secrets.SERVER_HOST }}
    username: ${{ secrets.SERVER_USER }}
    key: ${{ secrets.SSH_KEY }}
    port: 22
    script: |
      docker pull stinodee/day35-cicd:latest

      # Run new container on different port
      docker run -d -p 8081:80 --name myapp_new stinodee/day35-cicd:latest

      # Wait a bit for container to be ready
      sleep 5

      # Stop old container
      docker rm -f myapp || true

      # Rename new container to production
      docker rename myapp_new myapp

      # Switch back to port 8080
      docker stop myapp
      docker run -d -p 8080:80 --name myapp stinodee/day35-cicd:latest
